<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32x32.png">
  <link rel="stylesheet" href="./styles/main.css">

  <title>Profile card</title>
</head>
<body>
  <main>
    <article class="profile-card">
      <div class="profile-card__banner" aria-hidden="true"></div>

      <img
        class="profile-card__avatar"
        src="./images/image-victor.jpg"
        alt="Victor Crest"
        width="96"
        height="96"
      >

      <header class="profile-card__identity">
        <h1 class="profile-card__heading">
          <span class="profile-card__name">Victor Crest</span>
          <span class="profile-card__age">26</span>
        </h1>
        <p class="profile-card__location">London</p>
      </header>

      <ul class="profile-card__stats" role="list">
        <li class="stat">
          <p class="stat__value">80K</p>
          <p class="stat__label">Followers</p>
        </li>
        <li class="stat">
          <p class="stat__value">803K</p>
          <p class="stat__label">Likes</p>
        </li>
        <li class="stat">
          <p class="stat__value">1.4K</p>
          <p class="stat__label">Photos</p>
        </li>
      </ul>
    </article>
  </main>
</body>
</html>
